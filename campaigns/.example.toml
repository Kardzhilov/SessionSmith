# Campaign config template for SessionSmith.
# Copy this file to a name that matches your campaign, e.g. "damasus.toml",
# remove the leading dot, fill in your details, then run `sessionsmith`.
#
# All fields except [campaign].name are optional.

[campaign]
name    = "My Campaign"
gm      = "GM Name"
setting = "Setting — world, era, flavour"
notes   = ""

# Add one [[players]] block per player at the table.
[[players]]
player    = "Alice"
character = "Ragano"
ancestry  = "Wood Elf"
class     = "Rogue"

[[players]]
player    = "Bob"
character = "Drokel"
ancestry  = "Dwarf"
class     = "Fighter"

[system]
# One of: dnd5e | pf2e | coc | blades | daggerheart | generic | wordsmith
# Run `sessionsmith systems list` to see all bundled presets.
preset    = "generic"
# Free-form text appended to system prompts (house rules, tone notes, etc.)
overrides = ""

[outputs]
# Artifacts generated by default. Comment out ones you don't want.
default = ["bullets", "dm-notes", "recap", "summary", "story", "quotes"]

[prompts]
# Override any prompt's system instructions with your own text.
# Uncomment and fill in to customise.
# bullets     = ""
# dm_notes    = ""
# recap       = ""
# summary     = ""
# story       = ""
# quotes      = ""
# campaign_log = ""
